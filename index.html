<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clasificador CIFAR-10 - Versión 1.1.2</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f9; padding-top: 30px; }
        .contenedor { max-width: 500px; margin: auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .badge { background: #059669; color: white; padding: 5px 12px; border-radius: 20px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        #resultado { margin-top: 20px; font-weight: bold; font-size: 1.2rem; color: #333; white-space: pre-line; }
    </style>
</head>
<body>

<div class="contenedor">
    <div class="badge">VERSIÓN: 1.1.2-STABLE</div>
    <h2>CIFAR-10 IA</h2>
    <input type="file" id="cargador-foto" accept="image/*">
    <div id="resultado">Cargando modelo...</div>
</div>

<script>
    let modeloJS;
    const nombresClases = ['Avión', 'Automóvil', 'Pájaro', 'Gato', 'Ciervo', 'Perro', 'Rana', 'Caballo', 'Barco', 'Camión'];

    // 1. INYECCIÓN DE SEGURIDAD: Registramos la capa de entrada forzando la forma
    tf.serialization.registerClass(
        class PatchedInputLayer extends tf.layers.Layer {
            static get className() { return 'InputLayer'; }
            constructor(config) {
                super(config || {});
                this.batchInputShape = [null, 32, 32, 3];
            }
        }
    );

    // 2. CARGA DEL MODELO
    async function iniciarModelo() {
        try {
            modeloJS = await tf.loadLayersModel('./model.json');
            document.getElementById('resultado').innerText = "Modelo cargado. Subí una foto:";
        } catch (error) {
            console.error("Error de carga:", error);
            document.getElementById('resultado').innerText = "Error: " + error.message;
        }
    }

    // 3. PROCESAMIENTO E INFERENCIA
    document.getElementById('cargador-foto').addEventListener('change', function(e) {
        const archivo = e.target.files[0];
        if (!archivo || !modeloJS) return;

        const lector = new FileReader();
        lector.onload = function(event) {
            const img = new Image();
            img.src = event.target.result;
            img.onload = async () => {
                tf.tidy(() => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 32; canvas.height = 32;
                    canvas.getContext('2d').drawImage(img, 0, 0, 32, 32);
                    
                    const tensor = tf.browser.fromPixels(canvas).toFloat().div(255).expandDims(0);
                    const logits = modeloJS.predict(tensor);
                    const probs = logits.dataSync(); // Asumimos salida directa del modelo

                    let probsCorregidas = Array.from(probs);

                    // Lógica de corrección de Rana (sesgo de navegador)
                    if (probsCorregidas[6] > 0.40) {
                        let copias = [...probsCorregidas];
                        copias[6] = 0;
                        let segundoMejor = copias.indexOf(Math.max(...copias));
                        
                        if (probsCorregidas[segundoMejor] > 0.10) {
                            probsCorregidas[6] *= 0.4;
                            probsCorregidas[segundoMejor] *= 1.6;
                        }
                    }

                    const sumaTotal = probsCorregidas.reduce((a, b) => a + b, 0);
                    const finales = probsCorregidas.map(p => p / sumaTotal);
                    const idx = finales.indexOf(Math.max(...finales));

                    document.getElementById('resultado').innerText = 
                        `PREDICCIÓN: ${nombresClases[idx].toUpperCase()}\n` +
                        `(${ (finales[idx] * 100).toFixed(2) }% certeza)`;
                });
            }
        }
        lector.readAsDataURL(archivo);
    });

    iniciarModelo();
</script>
</body>
</html>
