<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clasificador CIFAR-10 Completo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .contenedor { max-width: 500px; margin: 0 auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        #vista-previa { max-width: 200px; margin-top: 15px; display: none; border-radius: 4px; }
        #resultado { margin-top: 20px; font-weight: bold; font-size: 1.2rem; color: #333; white-space: pre-line; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        button:disabled { background-color: #ccc; }
    </style>
</head>
<body>

<div class="contenedor">
    <h2>Clasificador de Imágenes (CIFAR-10)</h2>
    <p id="estado">Cargando modelo de Inteligencia Artificial...</p>
    
    <input type="file" id="cargador-foto" accept="image/*" disabled><br>
    <img id="vista-previa" src="#" alt="Tu foto">
    <div id="resultado"></div>
</div>

<script>
    let modeloJS;
    const nombresClases = ['Avión', 'Automóvil', 'Pájaro', 'Gato', 'Ciervo', 'Perro', 'Rana', 'Caballo', 'Barco', 'Camión'];

    async function iniciarModelo() {
        try {
            // REGISTRO ESTRICTO: Enseña a TFJS a interpretar la InputLayer de Keras v3
            tf.serialization.registerClass(
                class PatchedInputLayer extends tf.layers.Layer {
                    static get className() { return 'InputLayer'; }
                    constructor(config) {
                        super(config || {});
                        this.batchInputShape = config.batch_shape || config.batchInputShape || [null, 32, 32, 3];
                    }
                }
            );

            // Carga directa del archivo JSON original de tu repositorio
            modeloJS = await tf.loadLayersModel('./model.json');
            
            document.getElementById('estado').innerText = "¡Modelo cargado! Subí una foto para testear:";
            document.getElementById('cargador-foto').disabled = false;
        } catch (error) {
            document.getElementById('estado').innerText = "Error crítico al inicializar la red neuronal.";
            console.error("Detalle del error:", error);
        }
    }

    document.getElementById('cargador-foto').addEventListener('change', function(e) {
        const archivo = e.target.files[0];
        if (!archivo) return;

        const lector = new FileReader();
        lector.onload = function(event) {
            const imgElement = document.getElementById('vista-previa');
            imgElement.src = event.target.result;
            imgElement.style.display = "inline-block";

            imgElement.onload = async function() {
                document.getElementById('resultado').innerText = "Analizando...";

                // Encapsulamos en tf.tidy para limpiar automáticamente tensores temporales
                tf.tidy(() => {
                    // 1. Forzamos 3 canales (RGB) eliminando el canal Alfa (transparencia)
                    let tensor = tf.browser.fromPixels(imgElement, 3) 
                        // 2. Redimensionado bilineal para suavizar bordes y evitar distorsión
                        .resizeBilinear([32, 32]) 
                        .toFloat()
                        // 3. Normalización idéntica a Python (escalado 0-1)
                        .div(tf.scalar(255.0));

                    // 4. Agregamos dimensión de lote -> [1, 32, 32, 3]
                    let input = tensor.expandDims(0);
                    
                    // 5. Predicción y cálculo de probabilidades reales con Softmax
                    let logits = modeloJS.predict(input);
                    let probabilidades = tf.softmax(logits).dataSync();

                    // 6. Buscamos el índice con mayor confianza
                    let indicePredicho = probabilidades.indexOf(Math.max(...probabilidades));
                    let certeza = (probabilidades[indicePredicho] * 100).toFixed(2);

                    // 7. Mostramos el resultado en pantalla
                    document.getElementById('resultado').innerText = 
                        `Predicción: ${nombresClases[indicePredicho].toUpperCase()}\nConfianza: ${certeza}%`;
                });
            }
        }
        lector.readAsDataURL(archivo);
    });

    iniciarModelo();
</script>

</body>
</html>
